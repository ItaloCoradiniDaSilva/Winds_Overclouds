<head>
    <link rel="stylesheet" href="/css/conta.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="avião_logo_nova.png">
    <title>Wings Overclouds</title>
</head>

<body>
    <header id="topo">
        <nav>
            <div class="caixa">
                <img src="../imagens/avião_logo_nova.png" alt="Wings Overclouds" id="logo">
                <a class="navegador" href="../index.html">Home</a>
                <a class="navegador" href="/html/voos.html">Voos</a>
                <a class="navegador" href="/html/perfilUsuario.html">Conta</a>

            </div>
        </nav>
    </header>
    <main id="meio">
        <h2 class="titulo">Cadastro</h2>

        <p>Junte-se a Nós para ir nessa viagem incrivel! .</p>
        <div id="inputs">
            <h6>Seu Nome</h6>
            <input type="text" id="nomeUsuario" placeholder="Seu Nome Completo">
            <h6>Email</h6>
            <input type="email" id="emailUsuario" placeholder="Seu Email">
            <h6>Sua senha</h6>
            <input type="password" id="numeroUsuario" placeholder="Numero de Telefone">
            <h6>Seu RG</h6>
            <input type="number" id="rgUsuario" placeholder="Informe seu RG">
            <h6>Data de Nascimento</h6>
            <input type="date" id="dataUsuário" min="1900-01-01">


            <input type="button" value="Registrar" id="registrarUsuario">
            <h6 id="saida"></h6>


        </div>

    </main>

    <footer id="chao">

        </p>
